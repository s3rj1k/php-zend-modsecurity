# HAProxy front end for the WAF test/bench stack.
# Lenient parsing so the WAF is the verifier, not HAProxy.

global
    log stdout format raw local0
    maxconn 4096
    # Allow GET/HEAD/DELETE to carry a body (rule 1106).
    h1-accept-payload-with-any-method

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend http-in
    bind :80
    # Lenient parsing, forward forbidden header chars instead of 400.
    option accept-unsafe-violations-in-http-request
    default_backend php-fpm

backend php-fpm
    use-fcgi-app php-fpm
    # Reuse the connection across requests. check detects a dead FPM.
    server fpm1 php-fpm:9000 proto fcgi check

fcgi-app php-fpm
    log-stderr global
    docroot /var/www/html
    index   index.php
    # Forward Authorization (omitted by the fcgi-app by default) for WAF
    # rules 033/044.
    pass-header Authorization
    # No path-info regex. With one, HAProxy rejects NUL/newline in the path
    # with 500 before forwarding.
