; Enabled with the OWASP Core Rule Set (~700+ rules). Loaded via
; /etc/modsecurity/crs-load.conf, CRS is bind mounted at /etc/modsecurity/crs/.
[waf]
waf.enabled = 1
waf.modsec_rules_file = /etc/modsecurity/crs-load.conf
waf.modsec_response_body_limit = 1048576
waf.modsec_request_body_limit = 10485760
