; Enabled with the project's test rule set (~99 rules), the same rules used
; by the e2e FTW suite. A realistic "medium" rule load.
[waf]
waf.enabled = 1
waf.modsec_rules_file = /etc/modsecurity/rules.conf
waf.modsec_block_status = 403
waf.modsec_response_body_limit = 1048576
waf.modsec_request_body_limit = 10485760

; Audit logging (RelevantOnly), only blocked/matched transactions are
; written, so benign traffic incurs no I/O cost.
waf.modsec_audit_log = /var/log/modsec_audit.log
waf.modsec_audit_log_parts = "ABCFHKZ"
