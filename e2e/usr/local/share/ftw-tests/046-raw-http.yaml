---
# Cases the FTW YAML map cannot express: empty header value and duplicate
# headers. Uses go-ftw `encoded_request` stages (base64 raw HTTP). Other former
# raw cases (%0a in ARGS, %00 in URI) are in 030 / 045.

meta:
  author: "PHP WAF Team"
  description: "Raw HTTP cases requiring encoded_request"
  enabled: true
  name: "046-raw-http.yaml"

tests:
  - test_id: 1
    test_title: "Block empty Accept header"
    desc: "Empty Accept triggers rule 1104"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          encoded_request: "R0VUIC9pbmRleC5waHAgSFRUUC8xLjENCkhvc3Q6IGxvY2FsaG9zdA0KVXNlci1BZ2VudDogcmF3LWhhcm5lc3MNCkFjY2VwdDogDQpDb25uZWN0aW9uOiBjbG9zZQ0KDQo="
        output:
          status: 403

  - test_id: 2
    test_title: "Block HTTP/1.0 protocol"
    desc: "HTTP/1.0 triggers rule 1109"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          method: "GET"
          version: "HTTP/1.0"
          uri: "/index.php"
          headers:
            User-Agent: "raw-harness"
            Accept: "*/*"
            Host: "localhost"
        output:
          status: 403

  - test_id: 3
    test_title: "Allow HTTP/1.1 protocol"
    desc: "HTTP/1.1 must not trigger rule 1109"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          method: "GET"
          version: "HTTP/1.1"
          uri: "/index.php"
          headers:
            User-Agent: "raw-harness"
            Accept: "*/*"
            Host: "localhost"
        output:
          status: 200

  - test_id: 4
    test_title: "Handle duplicate Content-Type gracefully"
    desc: "Duplicate Content-Type must not block (extension collapses to one scalar)"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          encoded_request: "UE9TVCAvcG9zdC5waHAgSFRUUC8xLjENCkhvc3Q6IGxvY2FsaG9zdA0KVXNlci1BZ2VudDogcmF3LWhhcm5lc3MNCkNvbnRlbnQtVHlwZTogYXBwbGljYXRpb24vanNvbg0KQ29udGVudC1UeXBlOiBhcHBsaWNhdGlvbi94LXd3dy1mb3JtLXVybGVuY29kZWQNCkNvbnRlbnQtTGVuZ3RoOiAyDQpDb25uZWN0aW9uOiBjbG9zZQ0KDQp7fQ=="
        output:
          status: 200

  - test_id: 5
    test_title: "Handle matching duplicate Content-Type gracefully"
    desc: "Even matching duplicate Content-Type values must not block"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          encoded_request: "UE9TVCAvcG9zdC5waHAgSFRUUC8xLjENCkhvc3Q6IGxvY2FsaG9zdA0KVXNlci1BZ2VudDogcmF3LWhhcm5lc3MNCkNvbnRlbnQtVHlwZTogYXBwbGljYXRpb24vanNvbg0KQ29udGVudC1UeXBlOiBhcHBsaWNhdGlvbi9qc29uDQpDb250ZW50LUxlbmd0aDogMg0KQ29ubmVjdGlvbjogY2xvc2UNCg0Ke30="
        output:
          status: 200

  - test_id: 6
    test_title: "NUL byte in body must not crash"
    desc: "Percent-encoded NUL (%00) in POST body is handled without a 5xx"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          method: "POST"
          uri: "/post.php"
          headers:
            User-Agent: "raw-harness"
            Host: "localhost"
            Content-Type: "application/x-www-form-urlencoded"
          data: "data=hello%00world"
        output:
          status: 200

  - test_id: 7
    test_title: "Block oversized response marker in inspected prefix"
    desc: "Rule 1008 marker inside the inspected prefix (small body) is blocked"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          method: "GET"
          uri: "/big.php?pad=0&mark=1"
          headers:
            User-Agent: "raw-harness"
            Accept: "*/*"
            Host: "localhost"
        output:
          status: 403

  - test_id: 8
    test_title: "Allow oversized benign response"
    desc: "A >1MB benign response (no marker) streams through and is allowed"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          method: "GET"
          uri: "/big.php?pad=2000000"
          headers:
            User-Agent: "raw-harness"
            Accept: "*/*"
            Host: "localhost"
        output:
          status: 200

  - test_id: 9
    test_title: "Allow oversized response marker in overflow tail"
    desc: "Rule 1008 marker placed after the 1MB limit is in the uninspected tail"
    stages:
      - input:
          dest_addr: "bridge"
          port: 80
          method: "GET"
          uri: "/big.php?pad=2000000&mark=1"
          headers:
            User-Agent: "raw-harness"
            Accept: "*/*"
            Host: "localhost"
        output:
          status: 200
